  <title>Single Photo Infinite Pan – Seamless Loop</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(90deg, hwb(39 6% 75%), oklab(44.585% -0.01174 0.085), lab(28.17% -5.79 28.97));
      background-size: 200% 200%;
      animation: gradient-move 7s ease infinite;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .window {
      width: 384px;
      height: 854px;
      overflow: hidden;
      position: relative;
      border: 1px solid #444;           /* optional – remove if you don't want visible frame */
      background: linear-gradient(90deg, hwb(0 100% 0%), oklab(79.535% 0.03651 -0.01467), lab(68.78% -10.79 60.55));
      background-size: 200% 200%;
      animation: gradient-move 7s ease infinite;
      border-radius: 8px;
    }

    .track {
      display: flex;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      animation: pan-left 2400s linear infinite;   /* adjust time: 15s=faster, 30s=slower */
      will-change: transform;
    }

    .photo {
      height: 100%;
      width: auto;
      min-width: 384px;                   /* prevents tiny images from breaking */
      flex-shrink: 0;
      display: block;
    }

    @keyframes pan-left {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-100%);
      }
    }

    /* Optional: pause on hover */
    .window:hover .track {
      /* animation-play-state: paused; */
    }

    .exit-btn {
    position: absolute;
    top: 12px;
    right: 24px;
    width: 36px;
    height: 36px;
    background: rgba(0, 0, 0, 0.65);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    font-weight: bold;
    line-height: 36px;
    text-align: center;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s;
    user-select: none;
    opacity: 0.6;
}

@media (max-width: 500px) {
      .exit-btn {
        top: 16px;
        right: 16px;
        width: 56px;
        height: 56px;
        font-size: 32px;
        line-height: 56px;
      }
    }


/* Animation keyframes */
@keyframes gradient-move {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
  </style>

<script>
// ────────────────────────────────────────────────
// Randomize photo order on every page load
// ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    const track = document.getElementById('track');
    const items = Array.from(track.children);
    
    // Fisher-Yates (modern) shuffle
    for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
    }
    
    // Remove old children and append in new random order
    track.innerHTML = '';
    items.forEach(item => track.appendChild(item));
});
</script>
