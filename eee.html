<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Single Photo Infinite Pan – Seamless Loop</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #111;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .window {
      width: 384px;
      height: 854px;
      overflow: hidden;
      position: relative;
      border: 1px solid #444;           /* optional – remove if you don't want visible frame */
      background: #000;
    }

    .track {
      display: flex;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      animation: pan-left 400s linear infinite;   /* adjust time: 15s=faster, 30s=slower */
      will-change: transform;
    }

    .photo {
      height: 100%;
      width: auto;
      min-width: 384px;                   /* prevents tiny images from breaking */
      flex-shrink: 0;
      display: block;
    }

    @keyframes pan-left {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-100%);
      }
    }

    /* Optional: pause on hover */
    .window:hover .track {
      /* animation-play-state: paused; */
    }
  </style>
</head>
<body>
